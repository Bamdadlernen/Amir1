<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>FlashKarte – Deutsch A1/A2</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;900&family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0a0c10; --paper:#f2ede4; --cream:#ebe4d8; --warm:#ddd5c8;
  --card:#faf7f1; --gold:#c9963c; --gold2:#b07d28; --goldl:#f0d080;
  --teal:#1a6b5e; --teal2:#0d4a40; --teall:#d0ebe6;
  --rose:#8b3a3a; --green:#2d6a4f;
  --c1:#18150f; --c2:#3d3530; --c3:#6b5f54; --c4:#9e8e80; --c5:#c8b8a8;
  --fa:'Vazirmatn',sans-serif; --de:'Readex Pro',sans-serif;
  --sh:0 8px 32px rgba(0,0,0,.12);
}
html,body{height:100%;background:var(--paper);overflow:hidden;font-family:var(--fa)}

/* NOISE */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");opacity:.35;pointer-events:none;z-index:0}
.app{position:relative;height:100vh;display:flex;flex-direction:column;z-index:1;max-width:480px;margin:0 auto}

/* WELCOME BAR */
.welcome-bar{padding:7px 16px 5px;display:flex;align-items:center;gap:6px;flex-shrink:0;background:linear-gradient(90deg,rgba(26,107,94,.08),transparent)}
.wb-de{font-family:var(--de);font-size:12px;font-weight:500;color:var(--c4)}
.wb-name{font-family:var(--de);font-size:13px;font-weight:700;color:var(--teal)}
.wb-wave{font-size:14px}

/* HEADER */
.hdr{padding:10px 14px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--teal2),var(--teal));display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 10px rgba(13,74,64,.3)}
.logo-text{font-family:var(--de);font-size:17px;font-weight:700;color:var(--c1)}
.hdr-right{display:flex;align-items:center;gap:8px}
.pi{font-size:11px;color:var(--c4);font-weight:600;font-variant-numeric:tabular-nums}
.hdr-btn{padding:5px 12px;border-radius:16px;border:1px solid rgba(0,0,0,.1);background:var(--cream);font-size:11px;font-weight:600;color:var(--c3);cursor:pointer;font-family:var(--fa)}

/* PROGRESS */
.pbar{height:3px;background:var(--warm);flex-shrink:0}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));transition:width .5s ease;position:relative}
.pbar-fill::after{content:'';position:absolute;right:-3px;top:-3px;width:9px;height:9px;border-radius:50%;background:var(--gold)}

/* STAGE TABS */
.tabs{display:flex;gap:5px;padding:8px 12px 4px;flex-shrink:0}
.tab{flex:1;padding:7px 4px;border-radius:10px;font-size:10px;font-weight:700;color:var(--c5);text-align:center;background:var(--cream);border:1.5px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.tab.done{background:var(--teall);color:var(--teal);border-color:rgba(26,107,94,.25)}
.tab.active{background:var(--teal);color:#fff;box-shadow:0 3px 12px rgba(26,107,94,.3)}
.tab-num{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.25);font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tab.done .tab-num{background:rgba(26,107,94,.3)}
.tab:not(.active):not(.done) .tab-num{background:rgba(0,0,0,.08)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:8px 12px 0;display:flex;flex-direction:column;align-items:stretch;gap:10px;min-height:0}
.main::-webkit-scrollbar{display:none}

/* CARD */
.card{border-radius:22px;overflow:hidden;box-shadow:var(--sh)}

/* ─── STAGE 0: LESEN ─── */
.card-read{background:var(--card);border:1px solid rgba(0,0,0,.06)}
.read-hero{background:linear-gradient(160deg,var(--teal2) 0%,var(--teal) 100%);padding:24px 20px 22px;text-align:center;position:relative;overflow:hidden}
.read-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.read-hero::after{content:'';position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.04)}
.read-ch{font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.45);text-transform:uppercase;margin-bottom:10px}
.read-emoji{font-size:60px;display:block;margin-bottom:10px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.2))}
.read-word{font-family:var(--de);font-size:30px;font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1.3;position:relative;z-index:1}
.read-gram{font-size:11px;color:rgba(255,255,255,.55);margin-top:6px;font-family:var(--de);line-height:1.5}
.speak-row{margin-top:14px;display:flex;justify-content:center;gap:8px}
.speak-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;cursor:pointer;font-size:12px;color:#fff;font-family:var(--fa);transition:all .15s}
.speak-btn:hover{background:rgba(255,255,255,.22)}
.read-body{padding:16px 18px}
.fa-reveal-btn{width:100%;padding:11px 0;border-radius:12px;background:var(--cream);border:1px solid rgba(0,0,0,.08);cursor:pointer;font-family:var(--fa);font-size:13px;font-weight:600;color:var(--c3);transition:all .15s}
.fa-reveal-btn:hover{background:var(--warm)}
.fa-text{font-size:24px;font-weight:800;color:var(--c1);direction:rtl;text-align:center;line-height:1.7;margin-top:12px;padding:12px 14px;background:rgba(26,107,94,.06);border:1px solid rgba(26,107,94,.15);border-radius:12px;display:none;animation:fadeIn .3s ease}
.fa-text.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ─── STAGE 1: SCHREIBEN ─── */
.card-write{background:linear-gradient(160deg,#0f2620 0%,#0a1c18 100%);border:1px solid rgba(255,255,255,.07)}
.write-hdr{padding:13px 16px 11px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px}
.write-emoji{font-size:20px}
.write-title{font-size:12px;font-weight:700;color:rgba(255,255,255,.65)}
.write-hint{font-size:11px;color:rgba(255,255,255,.3);margin-left:auto;direction:rtl}
.write-body{padding:18px 14px 18px;text-align:center}
.write-fa{font-size:12px;color:rgba(201,150,60,.8);direction:rtl;margin-bottom:14px;font-weight:600;padding:7px 12px;background:rgba(201,150,60,.07);border-radius:8px;display:inline-block}
.word-boxes{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:0 auto 0}
.lb{height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--de);font-weight:700;transition:all .2s;flex-shrink:0}
.lb.shown{width:36px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.1);font-size:17px}
.lb.sp{width:8px;background:transparent;border:none}
.lb.hy{width:16px;background:transparent;border:none;color:rgba(255,255,255,.35);font-size:16px}
.lb-inp{width:36px;height:44px;border-radius:8px;background:rgba(255,255,255,.06);border:2px solid rgba(201,150,60,.45);color:var(--goldl);font-family:var(--de);font-weight:700;font-size:17px;text-align:center;outline:none;transition:all .2s;flex-shrink:0;-webkit-appearance:none;appearance:none;caret-color:var(--gold)}
.lb-inp:focus{border-color:var(--gold);background:rgba(201,150,60,.08);box-shadow:0 0 0 3px rgba(201,150,60,.15)}
.lb-inp.ok{border-color:#4caf7d;background:rgba(45,106,79,.2);color:#6fdc9a}
.lb-inp.err{border-color:#e07070;background:rgba(139,58,58,.2);color:#ff9a9a}
/* Long words */
.wbl .lb.shown,.wbl .lb-inp{width:30px;font-size:14px}
.wbvl .lb.shown,.wbvl .lb-inp{width:24px;font-size:12px;height:38px}
.write-result{margin-top:14px;font-size:14px;font-weight:800;animation:fadeIn .3s ease}
.write-result.ok{color:#6fdc9a}
.write-result.err{color:#ff9a9a}
.write-gram{font-size:11px;color:rgba(255,255,255,.35);margin-top:8px;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:8px;font-family:var(--de);display:none;animation:fadeIn .3s ease}
.write-gram.on{display:block}

/* ─── STAGE 2: SÄTZE ─── */
.card-sent{background:linear-gradient(160deg,#080f0d 0%,#040c09 100%);border:1px solid rgba(255,255,255,.06)}
.sent-hdr{padding:12px 15px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
.sent-hdr-l{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--gold)}
.sent-hdr-r{font-family:var(--de);font-size:11px;color:rgba(255,255,255,.25)}
.sent-body{padding:10px 12px 14px;display:flex;flex-direction:column;gap:7px}
.sent-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:12px 13px;cursor:pointer;transition:all .15s}
.sent-item:hover{background:rgba(255,255,255,.07)}
.sent-de{font-family:var(--de);font-size:13px;color:rgba(255,255,255,.82);line-height:1.65}
.sent-de .hl{color:var(--goldl);font-weight:700}
.sent-fa{font-family:var(--fa);font-size:11px;color:rgba(255,255,255,.4);direction:rtl;text-align:right;margin-top:5px;line-height:1.6}
.sent-spk{margin-top:7px;display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(26,107,94,.2);border:1px solid rgba(26,107,94,.3);border-radius:7px;font-size:10px;color:#2aaa8e;font-family:var(--fa)}
.loader-box{padding:36px 20px;text-align:center}
.loader-emoji{font-size:36px;animation:spin 1.2s linear infinite;display:block;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:12px;color:rgba(255,255,255,.35)}

/* BOTTOM */
.bottom{padding:8px 12px 16px;flex-shrink:0;display:flex;flex-direction:column;align-items:stretch;gap:7px}
.btn-next{padding:13px 0;border-radius:15px;background:var(--teal);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:var(--fa);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;box-shadow:0 4px 16px rgba(26,107,94,.35)}
.btn-next:hover{background:var(--teal2);transform:translateY(-1px)}
.btn-next:active{transform:translateY(0)}
.btn-check{padding:13px 0;border-radius:15px;background:var(--gold2);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:var(--fa);transition:all .15s;box-shadow:0 4px 16px rgba(176,125,40,.35)}
.btn-check:hover{background:#9a6b1e;transform:translateY(-1px)}
.rating-row{display:flex;gap:8px}
.btn-fail{flex:1;padding:12px 0;background:rgba(139,58,58,.15);border:1.5px solid rgba(139,58,58,.3);border-radius:14px;color:#ff9a9a;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--fa);transition:all .15s}
.btn-ok{flex:1;padding:12px 0;background:rgba(26,107,94,.15);border:1.5px solid rgba(26,107,94,.3);border-radius:14px;color:#2aaa8e;cursor:pointer;font-size:14px;font-weight:700;font-family:var(--fa);transition:all .15s}
.btn-fail:hover{background:rgba(139,58,58,.25)}
.btn-ok:hover{background:rgba(26,107,94,.25);transform:translateY(-1px)}

/* DECK OVERLAY */
.deck-ov{position:fixed;inset:0;background:rgba(8,10,14,.6);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(6px)}
.deck-ov.on{display:flex}
.deck-sheet{background:var(--card);border-radius:22px 22px 0 0;padding:18px 16px;width:100%;max-width:480px;margin:0 auto;max-height:72vh;overflow-y:auto;animation:sUp .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.deck-t{font-size:15px;font-weight:800;margin-bottom:14px;color:var(--c1)}
.di{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:13px;cursor:pointer;margin-bottom:5px;transition:all .15s;border:1.5px solid transparent}
.di:hover{background:var(--cream)}
.di.on{background:var(--teall);border-color:rgba(26,107,94,.25)}
.di-icon{font-size:20px;width:34px;text-align:center;flex-shrink:0}
.di-name{font-size:13px;font-weight:700;color:var(--c1)}
.di-cnt{font-size:11px;color:var(--c4);margin-top:1px}
.di-chk{margin-left:auto;color:var(--teal);font-size:16px}

/* DONE */
.done{position:fixed;inset:0;background:var(--paper);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:20;padding:28px;max-width:480px;margin:0 auto}
.done.on{display:flex}
.done-medal{font-size:80px;animation:bIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes bIn{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.done-title{font-size:26px;font-weight:900;color:var(--c1)}
.done-sub{font-size:13px;color:var(--c3);text-align:center;direction:rtl;line-height:1.8}
.done-stats{display:flex;gap:10px}
.done-stat{background:var(--card);border:1px solid rgba(0,0,0,.07);border-radius:16px;padding:16px 20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.done-v{font-family:var(--de);font-size:30px;font-weight:700}
.done-l{font-size:10px;color:var(--c4);margin-top:4px;font-weight:600}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;border-radius:100px;padding:8px 18px;font-size:12px;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="welcome-bar">
    <span class="wb-de">Willkommen,</span>
    <span class="wb-name">Amir Rezai</span>
    <span class="wb-wave">👋</span>
  </div>
  <div class="hdr">
    <div class="logo">
      <div class="logo-mark">🧠</div>
      <div class="logo-text">FlashKarte</div>
    </div>
    <div class="hdr-right">
      <span class="pi" id="pi">۱ / ۱</span>
      <button class="hdr-btn" onclick="openDeck()">📦 فصل</button>
    </div>
  </div>
  <div class="pbar"><div class="pbar-fill" id="pf" style="width:0%"></div></div>
  <div class="tabs" id="tabs">
    <div class="tab" id="t0"><div class="tab-num">۱</div>📖 خواندن</div>
    <div class="tab" id="t1"><div class="tab-num">۲</div>✏️ نوشتن</div>
    <div class="tab" id="t2"><div class="tab-num">۳</div>💬 جملات</div>
  </div>
  <div class="main" id="main"></div>
  <div class="bottom" id="bot"></div>

  <!-- Deck overlay -->
  <div class="deck-ov" id="deck-ov" onclick="if(event.target===this)closeDeck()">
    <div class="deck-sheet">
      <div class="deck-t">📦 انتخاب فصل</div>
      <div id="dl"></div>
    </div>
  </div>

  <!-- Done -->
  <div class="done" id="done-screen">
    <div class="done-medal" id="dm">🎉</div>
    <div class="done-title">آفرین!</div>
    <div class="done-sub" id="done-sub">همه کارت‌ها تموم شد</div>
    <div class="done-stats">
      <div class="done-stat"><div class="done-v" style="color:var(--green)" id="ds-ok">0</div><div class="done-l">درست ✓</div></div>
      <div class="done-stat"><div class="done-v" style="color:var(--rose)" id="ds-fail">0</div><div class="done-l">اشتباه ✗</div></div>
    </div>
    <button class="btn-next" onclick="restart()" style="max-width:200px;margin-top:4px">🔄 دوباره</button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
'use strict';

/* ══════════════════════════════════

   [word_de, fa, grammar, emoji, chapter]

const W = [

['erklären','توضیح دادن','Verb | hat erklärt | die Erklärung','📖',9],
['leise','آرام / بی‌صدا','Adjektiv/Adverb | Gegenteil: laut','🤫',9],
['aufstehen','بلند شدن','trennbar | steht auf | ist aufgestanden','🧍',9],

/* ── STATE ── */
let S={
  words:[], idx:0, stage:0, deck:'all',
  sentences:null, loading:false,
  blanks:null, checked:false, correct:false,
  userAnswers:{}, showFa:false,
  stats:{ok:0,fail:0},
};

/* ── INIT ── */
function init(){
  buildDeckList();
  loadDeck();
}

function loadDeck(){
  const src=S.deck==='all'?W:W.filter(w=>w[4]==S.deck);
  const seen=new Set();
  S.words=src.filter(w=>{if(seen.has(w[0]))return false;seen.add(w[0]);return true;})
             .sort(()=>Math.random()-.5);
  S.idx=0;S.stage=0;S.stats={ok:0,fail:0};
  resetCard();
  document.getElementById('done-screen').classList.remove('on');
  render();
}

function resetCard(){
  S.sentences=null;S.blanks=null;S.checked=false;
  S.correct=false;S.userAnswers={};S.showFa=false;S.loading=false;
}

/* ── RENDER ── */
function render(){
  if(S.idx>=S.words.length){showDone();return;}
  updateProgress();updateTabs();
  const w=S.words[S.idx];
  if(S.stage===0)renderLesen(w);
  else if(S.stage===1)renderSchreiben(w);
  else renderSaetze(w);
}

function updateProgress(){
  const pct=S.words.length?(S.idx/S.words.length*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pi').textContent=`${S.idx+1} / ${S.words.length}`;
}

function updateTabs(){
  ['t0','t1','t2'].forEach((id,i)=>{
    const el=document.getElementById(id);
    const icons=['📖 خواندن','✏️ نوشتن','💬 جملات'];
    const nums=['۱','۲','۳'];
    el.className='tab'+(i===S.stage?' active':i<S.stage?' done':'');
    el.innerHTML=`<div class="tab-num">${nums[i]}</div>${icons[i]}`;
  });
}

/* ── STAGE 0: LESEN ── */
function renderLesen(w){
  const[word,fa,gram,emoji,ch]=w;
  document.getElementById('main').innerHTML=`
    <div class="card card-read">
      <div class="read-hero">
        <div class="read-ch">${CH_NAMES[ch]||''}</div>
        <span class="read-emoji">${emoji}</span>
        <div class="read-word">${word}</div>
        <div class="read-gram">${gram}</div>
        <div class="speak-row">
          <button class="speak-btn" onclick="speakWord()">🔊 تلفظ بشنو</button>
        </div>
      </div>
      <div class="read-body">
        <button class="fa-reveal-btn" id="frb" onclick="toggleFa()">👁️ ترجمه فارسی رو ببین</button>
        <div class="fa-text${S.showFa?' on':''}" id="fat">${fa}</div>
      </div>
    </div>`;
  document.getElementById('bot').innerHTML=`
    <button class="btn-next" onclick="goStage(1)">✏️ مرحله بعد: نوشتن ←</button>`;
}

function toggleFa(){
  S.showFa=!S.showFa;
  const el=document.getElementById('fat');
  const btn=document.getElementById('frb');
  if(el)el.classList.toggle('on',S.showFa);
  if(btn)btn.textContent=S.showFa?'🙈 پنهان کردن':'👁️ ترجمه فارسی رو ببین';
}

/* ── STAGE 1: SCHREIBEN ── */
function renderSchreiben(w){
  const[word,fa,gram,emoji]=w;
  if(!S.blanks)S.blanks=makeBlanks(word);
  const{chars,blanked}=S.blanks;
  const n=chars.length;
  const lenCls=n>=14?' wbvl':n>=10?' wbl':'';
  const bList=[...blanked].sort((a,b)=>a-b);

  let html=`<div class="word-boxes${lenCls}" id="wb">`;
  chars.forEach((c,i)=>{
    if(c===' '){html+=`<div class="lb sp"></div>`;return;}
    if(c==='-'){html+=`<div class="lb hy">-</div>`;return;}
    if(blanked.has(i)){
      const bk=bList.indexOf(i);
      if(S.checked){
        const typed=S.userAnswers[i]||'';
        const ok=typed===c.toLowerCase();
        html+=`<input class="lb-inp ${ok?'ok':'err'}" type="text" value="${c}" disabled id="bi${i}">`;
      }else{
        html+=`<input class="lb-inp" type="text" maxlength="1" data-p="${i}" data-bk="${bk}" id="bi${i}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" oninput="onIn(this)" onkeydown="onKey(event,this)">`;
      }
    }else{
      html+=`<div class="lb shown">${c}</div>`;
    }
  });
  html+='</div>';

  const resultHtml=S.checked?`<div class="write-result ${S.correct?'ok':'err'}">${S.correct?'✅ آفرین! درسته!':'❌ اشتباه — جواب درست نشون داده شد'}</div>`:'';
  const gramHtml=S.checked?`<div class="write-gram on">${gram}</div>`:'';

  document.getElementById('main').innerHTML=`
    <div class="card card-write">
      <div class="write-hdr">
        <div class="write-emoji">${emoji}</div>
        <div class="write-title">حروف خالی رو پر کن ✍️</div>
      </div>
      <div class="write-body">
        <div class="write-fa">${fa}</div>
        ${html}
        ${resultHtml}
        ${gramHtml}
      </div>
    </div>`;

  if(S.checked){
    document.getElementById('bot').innerHTML=`<button class="btn-next" onclick="goStage(2)">💬 مرحله بعد: جملات ←</button>`;
  }else{
    document.getElementById('bot').innerHTML=`<button class="btn-check" onclick="checkBlanks()">✔️ بررسی کن</button>`;
    setTimeout(()=>document.querySelector('.lb-inp')?.focus(),100);
  }
}

function onIn(el){
  el.setAttribute('data-v',el.value.toLowerCase());
  if(el.value.length===1){
    const bk=parseInt(el.getAttribute('data-bk'))+1;
    document.querySelector(`.lb-inp[data-bk="${bk}"]`)?.focus();
  }
}

function onKey(e,el){
  if(e.key==='Backspace'&&!el.value){
    const bk=parseInt(el.getAttribute('data-bk'))-1;
    if(bk>=0){const p=document.querySelector(`.lb-inp[data-bk="${bk}"]`);if(p){p.value='';p.focus();}}
  }
  if(e.key==='Enter')checkBlanks();
}

function checkBlanks(){
  const{chars,blanked}=S.blanks;
  let ok=true;const ans={};
  blanked.forEach(i=>{
    const inp=document.getElementById(`bi${i}`);
    const typed=(inp?.value||'').toLowerCase().trim();
    ans[i]=typed;
    if(typed!==chars[i].toLowerCase())ok=false;
  });
  S.userAnswers=ans;S.checked=true;S.correct=ok;
  render();
}

function makeBlanks(word){
  const core=word.replace(/^(der|die|das|sich)\s+/gi,'');
  const chars=core.split('');
  const blanked=new Set();
  for(let i=1;i<chars.length-1;i++){
    if(chars[i]!==' '&&chars[i]!=='-'&&i%2===1)blanked.add(i);
  }
  if(blanked.size===0&&chars.length>2)blanked.add(1);
  return{core,chars,blanked};
}

/* ── STAGE 2: SÄTZE ── */
function renderSaetze(w){
  const[word,fa,gram,emoji]=w;
  const core=word.replace(/^(der|die|das|sich)\s+/gi,'');

  if(S.loading){
    document.getElementById('main').innerHTML=`
      <div class="card card-sent" style="padding:0">
        <div class="loader-box">
          <span class="loader-emoji">⚙️</span>
          <div class="loader-txt">داریم ۴ جمله می‌سازیم...</div>
        </div>
      </div>`;
    document.getElementById('bot').innerHTML='';
    return;
  }

  if(!S.sentences){loadSentences(word,fa);return;}

  const re=new RegExp(`(${escRe(core)})(?=[^a-zA-ZäöüÄÖÜß]|$)`,'gi');
  const rows=S.sentences.map((s,i)=>{
    const hl=s.de.replace(re,'<span class="hl">$1</span>');
    return`<div class="sent-item" onclick="speakSent(${i})">
      <div class="sent-de">${hl}</div>
      <div class="sent-fa">${s.fa}</div>
      <button class="sent-spk" onclick="event.stopPropagation();speakSent(${i})">🔊 بشنو</button>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML=`
    <div class="card card-sent">
      <div class="sent-hdr">
        <div class="sent-hdr-l">💬 ۴ جمله نمونه</div>
        <div class="sent-hdr-r">${emoji} ${word}</div>
      </div>
      <div class="sent-body">${rows}</div>
    </div>`;

  document.getElementById('bot').innerHTML=`
    <div class="rating-row">
      <button class="btn-fail" onclick="rate(false)">❌ نادیم</button>
      <button class="btn-ok"   onclick="rate(true)" >✅ یاد گرفتم!</button>
    </div>`;
}

async function loadSentences(word,fa){
  S.loading=true;render();
  const core=word.replace(/^(der|die|das|sich)\s+/gi,'');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:900,
        messages:[{role:'user',content:`Du bist ein Deutschlehrer für A1/A2-Lernende aus dem Iran. Erstelle 4 sehr einfache deutsche Sätze mit dem Wort "${core}". Das Wort muss GENAU in der Form "${core}" in jedem Satz vorkommen. Niveau A1/A2 – sehr kurze, klare Sätze. Antworte NUR mit JSON, kein anderer Text:\n[{"de":"...","fa":"..."},{"de":"...","fa":"..."},{"de":"...","fa":"..."},{"de":"...","fa":"..."}]`}]
      })
    });
    const data=await res.json();
    let txt=(data.content?.[0]?.text||'[]').replace(/```json|```/g,'').trim();
    S.sentences=JSON.parse(txt);
  }catch(e){
    S.sentences=[
      {de:`${core.charAt(0).toUpperCase()+core.slice(1)} ist sehr wichtig.`,fa:`${core} خیلی مهم است.`},
      {de:`Ich lerne das Wort „${core}".`,fa:`من کلمه «${core}» را یاد می‌گیرم.`},
      {de:`Können Sie „${core}" erklären?`,fa:`می‌توانید «${core}» را توضیح دهید؟`},
      {de:`Das Wort „${core}" kommt im Alltag vor.`,fa:`کلمه «${core}» در زندگی روزمره می‌آید.`},
    ];
  }
  S.loading=false;render();
}

/* ── NAVIGATION ── */
function goStage(n){
  S.stage=n;
  if(n===1){S.blanks=null;S.checked=false;S.correct=false;S.userAnswers={};}
  if(n===2){S.sentences=null;S.loading=false;}
  render();
}

function rate(ok){
  if(ok)S.stats.ok++;else S.stats.fail++;
  S.idx++;resetCard();render();
}

/* ── DONE ── */
function showDone(){
  const t=S.stats.ok+S.stats.fail;
  const acc=t?Math.round(S.stats.ok/t*100):0;
  document.getElementById('ds-ok').textContent=S.stats.ok;
  document.getElementById('ds-fail').textContent=S.stats.fail;
  document.getElementById('dm').textContent=acc>=80?'🎉':acc>=60?'👍':'💪';
  document.getElementById('done-sub').textContent=`${S.words.length} کارت مرور شد · دقت ${acc}٪`;
  document.getElementById('done-screen').classList.add('on');
}
function restart(){document.getElementById('done-screen').classList.remove('on');loadDeck();}

/* ── AUDIO — Web Speech API ── */
let _voices = [];
function _loadVoices(){
  _voices = window.speechSynthesis.getVoices();
}
_loadVoices();
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged = _loadVoices;

function speak(txt, lang){
  if(!window.speechSynthesis){showToast("⚠️ مرورگر از صدا پشتیبانی نمی‌کند");return;}
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt);
  // Try to find a native German voice
  const locale = lang === 'de' ? 'de' : 'fa';
  const native = _voices.find(v => v.lang.startsWith(locale) && v.localService);
  const any    = _voices.find(v => v.lang.startsWith(locale));
  u.voice = native || any || null;
  u.lang  = lang === 'de' ? 'de-DE' : 'fa-IR';
  u.rate  = 0.82;
  u.pitch = 1;
  window.speechSynthesis.speak(u);
}
function speakWord(){const w=S.words[S.idx];if(w)speak(w[0],"de");}
function speakSent(i){const s=S.sentences?.[i];if(s)speak(s.de,'de');}

/* ── DECK ── */
function buildDeckList(){
  document.getElementById('dl').innerHTML=DECKS.map(d=>{
    const cnt=d.id==='all'?W.length:W.filter(w=>w[4]===d.id).length;
    return`<div class="di${S.deck==d.id?' on':''}" onclick="selDeck('"+d.id+"')">
      <div class="di-icon">${d.icon}</div>
      <div><div class="di-name">${d.name}</div><div class="di-cnt">${cnt} کلمه</div></div>
      ${S.deck==d.id?'<div class="di-chk">✓</div>':''}
    </div>`;
  }).join('');
}
function openDeck(){buildDeckList();document.getElementById('deck-ov').classList.add('on');}
function closeDeck(){document.getElementById('deck-ov').classList.remove('on');}
function selDeck(id){S.deck=(id==='all'?'all':isNaN(id)?id:+id);closeDeck();loadDeck();showToast('📦 '+(DECKS.find(d=>d.id===id)?.name||id));}

/* ── HELPERS ── */
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
let _tt;
function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2000);
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key===' '||e.key==='Enter'){e.preventDefault();if(S.stage===0)goStage(1);else if(S.stage===2)rate(true);}
  if(e.key==='ArrowRight'&&S.stage===2)rate(true);
  if(e.key==='ArrowLeft'&&S.stage===2)rate(false);
  if(e.key==='p'||e.key==='P'){const w=S.words[S.idx];if(w)speak(w[0],'de');}
});

init();
</script>
</body>
